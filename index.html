<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#004d7a">
    <title>Order Vật Tư - Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #e9f0f5 0%, #dce6ef 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 40, 80, 0.15);
            overflow: hidden;
            margin-top: 20px;
        }

        .header {
            background: linear-gradient(135deg, #004d7a, #0077b6);
            padding: 25px 35px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .header .logo-icon {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #004d7a;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .header h1 small {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .form-body {
            padding: 30px 35px;
        }

        /* === Layout dạng card cho từng dòng vật tư === */
        .row-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .order-row {
            display: grid;
            grid-template-columns: 1.4fr 2fr 0.8fr 1fr auto;
            gap: 12px;
            align-items: start;
            padding: 14px;
            background: #f8fafc;
            border: 2px solid #e6edf3;
            border-radius: 16px;
            transition: all 0.25s ease;
        }
        .order-row:focus-within {
            border-color: #0077b6;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0, 119, 182, 0.08);
        }

        .field-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: #5a6f82;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .row-header {
            display: none;
            grid-template-columns: 1.4fr 2fr 0.8fr 1fr auto;
            gap: 12px;
            padding: 0 14px 8px 14px;
        }
        .row-header div {
            font-size: 0.78rem;
            font-weight: 700;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (min-width: 769px) {
            .row-header {
                display: grid;
            }
            .field-label {
                display: none;
            }
        }

        /* === Searchable dropdown === */
        .searchable {
            position: relative;
            width: 100%;
        }

        .searchable-input {
            width: 100%;
            padding: 12px 38px 12px 14px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fff;
            outline: none;
            color: #1a2b3c;
            cursor: pointer;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .searchable-input::placeholder {
            color: #95a5a6;
        }
        .searchable-input:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.1);
        }
        .searchable-input.has-value {
            font-weight: 500;
            color: #1a2b3c;
        }
        .searchable-input:disabled {
            background: #eef2f6;
            cursor: not-allowed;
            color: #95a5a6;
        }

        .searchable-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #7a8ba0;
            font-size: 0.75rem;
            transition: transform 0.2s;
        }
        .searchable.open .searchable-arrow {
            transform: translateY(-50%) rotate(180deg);
        }

        .searchable-clear {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            background: #e0e6ed;
            color: #5a6f82;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }
        .searchable-clear:hover {
            background: #c8d3df;
            color: #1a2b3c;
        }
        .searchable.has-selection .searchable-clear {
            display: flex;
        }

        .searchable-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border: 2px solid #0077b6;
            border-radius: 12px;
            max-height: 280px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 12px 28px rgba(0, 40, 80, 0.18);
            display: none;
            flex-direction: column;
        }
        .searchable.open .searchable-dropdown {
            display: flex;
        }

        .searchable-search-wrap {
            padding: 10px;
            border-bottom: 1px solid #eef2f6;
            background: #f8fafc;
        }
        .searchable-search {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #d6dfe8;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background: #fff;
        }
        .searchable-search:focus {
            border-color: #0077b6;
        }

        .searchable-options {
            overflow-y: auto;
            max-height: 220px;
            -webkit-overflow-scrolling: touch;
        }

        .searchable-option {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #1a2b3c;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.12s;
            line-height: 1.4;
        }
        .searchable-option:last-child {
            border-bottom: none;
        }
        .searchable-option:hover,
        .searchable-option.highlighted {
            background: #e8f4fd;
            color: #004d7a;
        }
        .searchable-option .opt-code {
            font-weight: 700;
            color: #0077b6;
            margin-right: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
        }
        .searchable-option mark {
            background: #ffeb99;
            color: inherit;
            padding: 0 1px;
            border-radius: 2px;
        }

        .searchable-empty {
            padding: 20px;
            text-align: center;
            color: #95a5a6;
            font-size: 0.9rem;
        }

        /* === ĐVT badge === */
        .dvt-badge {
            padding: 12px 14px;
            background: #eef3f8;
            border-radius: 12px;
            font-weight: 600;
            color: #1e4660;
            text-align: center;
            font-size: 0.95rem;
            border: 2px solid transparent;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === Số lượng input === */
        .soluong-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fff;
            transition: all 0.25s ease;
            outline: none;
            color: #1a2b3c;
        }
        .soluong-input:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.1);
        }

        /* === Nút xóa === */
        .btn-remove-row {
            background: #fff;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .btn-remove-row:hover, .btn-remove-row:active {
            background: #e74c3c;
            color: white;
        }

        /* === Action bar === */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            padding: 13px 26px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
        }

        .btn-add {
            background: #e8f4fd;
            color: #0077b6;
            border: 2px dashed #0077b6;
        }
        .btn-add:hover, .btn-add:active {
            background: #d0eaff;
            border-style: solid;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0077b6, #023e8a);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 119, 182, 0.3);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0096c7, #023e8a);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 119, 182, 0.4);
        }

        /* === Note === */
        .note-field {
            width: 100%;
            margin-top: 22px;
        }
        .note-field label {
            font-weight: 600;
            color: #2c3e50;
            display: block;
            margin-bottom: 6px;
        }
        .note-field textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e6ed;
            border-radius: 14px;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            background: #f9fbfd;
            outline: none;
            transition: border 0.25s;
            font-family: inherit;
        }
        .note-field textarea:focus {
            border-color: #0077b6;
            background: #fff;
        }

        /* === Footer === */
        .footer-info {
            margin-top: 25px;
            background: #f4f8fc;
            padding: 15px 20px;
            border-radius: 14px;
            color: #2c3e50;
            font-size: 0.88rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .webhook-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .webhook-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #95a5a6;
            display: inline-block;
        }
        .webhook-status .dot.active {
            background: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }

        /* === Toast === */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 14px 22px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            font-weight: 600;
            font-size: 0.92rem;
            display: none;
            max-width: 90vw;
            text-align: center;
            animation: slideDown 0.3s ease;
        }
        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* ============================================ */
        /* === MOBILE OPTIMIZATION === */
        /* ============================================ */
        @media (max-width: 768px) {
            body {
                padding: 0;
                background: #f4f7fa;
            }
            .container {
                margin-top: 0;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
            }
            .header {
                padding: 18px 16px;
                gap: 12px;
            }
            .header .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 24px;
                border-radius: 11px;
            }
            .header h1 {
                font-size: 1.05rem;
                letter-spacing: 0.3px;
            }
            .header h1 small {
                font-size: 0.78rem;
                margin-top: 3px;
            }
            .form-body {
                padding: 18px 14px 24px 14px;
            }

            /* Card layout cho mỗi row trên mobile */
            .order-row {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    "kho kho"
                    "ma ma"
                    "dvt soluong"
                    "remove remove";
                gap: 12px;
                padding: 16px;
                background: #fff;
                border: 1.5px solid #d6dfe8;
                box-shadow: 0 2px 6px rgba(0, 40, 80, 0.04);
                position: relative;
            }
            .order-row .cell-kho     { grid-area: kho; }
            .order-row .cell-ma      { grid-area: ma; }
            .order-row .cell-dvt     { grid-area: dvt; }
            .order-row .cell-soluong { grid-area: soluong; }
            .order-row .cell-remove  { grid-area: remove; justify-self: stretch; }

            .order-row .cell-remove .btn-remove-row {
                width: 100%;
                border-radius: 10px;
                height: 42px;
                font-size: 0.9rem;
                gap: 6px;
            }
            .order-row .cell-remove .btn-remove-row::after {
                content: 'Xóa mặt hàng';
                font-weight: 600;
            }

            .row-number {
                position: absolute;
                top: -10px;
                left: 14px;
                background: linear-gradient(135deg, #0077b6, #023e8a);
                color: white;
                padding: 3px 12px;
                border-radius: 20px;
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.5px;
                box-shadow: 0 3px 8px rgba(0, 119, 182, 0.3);
            }

            /* Dropdown chiếm full màn hình trên mobile */
            .searchable.open .searchable-dropdown {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                max-height: none;
                border-radius: 0;
                border: none;
                z-index: 9998;
                background: #fff;
            }
            .searchable.open .searchable-search-wrap {
                padding: 14px;
                background: linear-gradient(135deg, #004d7a, #0077b6);
                position: sticky;
                top: 0;
                z-index: 2;
            }
            .searchable.open .searchable-search-wrap::before {
                content: '🔍 Tìm kiếm';
                display: block;
                color: white;
                font-weight: 700;
                font-size: 0.95rem;
                margin-bottom: 8px;
            }
            .searchable.open .searchable-search {
                padding: 12px 14px;
                font-size: 16px; /* >=16px tránh iOS auto-zoom */
            }
            .searchable.open .searchable-options {
                max-height: none;
                flex: 1;
                padding-bottom: 80px;
            }
            .searchable.open .searchable-option {
                padding: 14px 16px;
                font-size: 0.95rem;
            }
            .searchable.open .searchable-close-mobile {
                display: flex;
            }

            .searchable-input {
                font-size: 16px; /* tránh iOS auto-zoom */
            }
            .soluong-input {
                font-size: 16px;
            }

            .action-bar {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 1rem;
            }
            .btn-submit {
                order: -1; /* Submit lên trên cho dễ bấm */
            }

            .footer-info {
                font-size: 0.82rem;
                padding: 12px 14px;
                flex-direction: column;
                align-items: flex-start;
            }

            .toast {
                top: 14px;
                left: 14px;
                right: 14px;
                transform: none;
                max-width: none;
                font-size: 0.88rem;
                padding: 12px 16px;
            }
            @keyframes slideDown {
                from { transform: translateY(-120%); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }

        /* Nút đóng dropdown trên mobile */
        .searchable-close-mobile {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 14px;
            background: #1a2b3c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Khi dropdown mở trên mobile, ngăn body scroll */
        body.dropdown-open {
            overflow: hidden;
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .form-body {
                padding: 25px 20px;
            }
            .order-row {
                grid-template-columns: 1.3fr 2fr 0.7fr 0.9fr auto;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🌊</div>
            <h1>
                PHIẾU YÊU CẦU ĐẶT VẬT TƯ
                <small>Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu</small>
            </h1>
        </div>
    </div>

    <div class="form-body">
        <form id="orderForm">
            <div class="row-header">
                <div>Kho</div>
                <div>Mã hàng - Tên hàng</div>
                <div>ĐVT</div>
                <div>Số lượng</div>
                <div></div>
            </div>

            <div class="row-list" id="orderRows">
                <!-- dynamic rows -->
            </div>

            <div class="action-bar">
                <button type="button" class="btn btn-add" id="addRowBtn">
                    ➕ Thêm mặt hàng
                </button>
                <button type="submit" class="btn btn-submit">
                    📤 Gửi yêu cầu đặt hàng
                </button>
            </div>

            <div class="note-field">
                <label for="noteInput">📝 Ghi chú yêu cầu</label>
                <textarea id="noteInput" placeholder="Nhập ghi chú (nếu có) ..."></textarea>
            </div>
        </form>

        <div class="footer-info">
            <div class="webhook-status">
                <span class="dot" id="webhookDot"></span>
                <span id="webhookLabel">Webhook N8N: Sẵn sàng</span>
            </div>
            <div style="color:#5c6b7a;">
                🕒 <span id="currentTime"></span>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/đ/g, 'd');
        }

        function highlight(text, query) {
            if (!query) return escapeHtml(text);

            if (idx === -1) return escapeHtml(text);
            return escapeHtml(text.slice(0, idx)) +
                   '<mark>' + escapeHtml(text.slice(idx, idx + query.length)) + '</mark>' +
                   escapeHtml(text.slice(idx + query.length));
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            })[c]);
        }

        // ========== SEARCHABLE DROPDOWN COMPONENT ==========
        function createSearchable(options, placeholder, onChange, disabled = false) {
            const wrap = document.createElement('div');
            wrap.className = 'searchable';
            if (disabled) wrap.classList.add('is-disabled');

            wrap.innerHTML = `
                <input type="text" class="searchable-input" readonly
                       placeholder="${escapeHtml(placeholder)}" ${disabled ? 'disabled' : ''}>
                <button type="button" class="searchable-clear" tabindex="-1" title="Xóa">✕</button>
                <span class="searchable-arrow">▼</span>
                <div class="searchable-dropdown">
                    <div class="searchable-search-wrap">
                        <input type="text" class="searchable-search"
                               placeholder="Gõ để tìm kiếm..." autocomplete="off">
                    </div>
                    <div class="searchable-options"></div>
                    <button type="button" class="searchable-close-mobile">✓ Đóng</button>
                </div>
            `;

            const input = wrap.querySelector('.searchable-input');
            const searchInput = wrap.querySelector('.searchable-search');
            const optsBox = wrap.querySelector('.searchable-options');
            const clearBtn = wrap.querySelector('.searchable-clear');
            const closeMobileBtn = wrap.querySelector('.searchable-close-mobile');

            let currentOptions = options;
            let selectedValue = null;
            let highlightedIdx = -1;

            function renderOptions(filterText = '') {
                const q = filterText.trim();
                const normQ = normalize(q);
                const filtered = !normQ ? currentOptions : currentOptions.filter(o =>
                    normalize(o.label).includes(normQ) ||
                    normalize(o.searchText || '').includes(normQ)
                );

                if (filtered.length === 0) {
                    optsBox.innerHTML = `<div class="searchable-empty">Không tìm thấy kết quả nào</div>`;
                    highlightedIdx = -1;
                    return;
                }

                optsBox.innerHTML = filtered.map((o, i) => {
                    const codeHtml = o.code ? `<span class="opt-code">${highlight(o.code, q)}</span>` : '';
                    const nameHtml = highlight(o.name || o.label, q);
                    return `<div class="searchable-option" data-value="${escapeHtml(o.value)}" data-idx="${i}">
                        ${codeHtml}${nameHtml}
                    </div>`;
                }).join('');
                highlightedIdx = -1;
            }

            function open() {
                if (wrap.classList.contains('is-disabled')) return;
                // Đóng các dropdown khác
                document.querySelectorAll('.searchable.open').forEach(el => {
                    if (el !== wrap) el.classList.remove('open');
                });
                wrap.classList.add('open');
                searchInput.value = '';
                renderOptions('');
                if (isMobile()) {
                    document.body.classList.add('dropdown-open');
                }
                // Auto focus vào ô search
                setTimeout(() => searchInput.focus(), 50);
            }

            function close() {
                wrap.classList.remove('open');
                if (!document.querySelector('.searchable.open')) {
                    document.body.classList.remove('dropdown-open');
                }
            }

            function setValue(value, label, silent = false) {
                selectedValue = value;
                if (value) {
                    input.value = label;
                    input.classList.add('has-value');
                    wrap.classList.add('has-selection');
                } else {
                    input.value = '';
                    input.classList.remove('has-value');
                    wrap.classList.remove('has-selection');
                }
                if (!silent && onChange) onChange(value, currentOptions.find(o => o.value === value));
            }

            function setOptions(newOptions, enable = true) {
                currentOptions = newOptions || [];
                wrap.classList.toggle('is-disabled', !enable);
                input.disabled = !enable;
                setValue(null, null, true);
            }

            // Events
            input.addEventListener('click', (e) => {
                e.stopPropagation();
                if (wrap.classList.contains('open')) close(); else open();
            });

            searchInput.addEventListener('input', (e) => {
                renderOptions(e.target.value);
            });

            searchInput.addEventListener('keydown', (e) => {
                const opts = optsBox.querySelectorAll('.searchable-option');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    highlightedIdx = Math.min(highlightedIdx + 1, opts.length - 1);
                    updateHighlight(opts);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    highlightedIdx = Math.max(highlightedIdx - 1, 0);
                    updateHighlight(opts);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (highlightedIdx >= 0 && opts[highlightedIdx]) {
                        opts[highlightedIdx].click();
                    } else if (opts.length === 1) {
                        opts[0].click();
                    }
                } else if (e.key === 'Escape') {
                    close();
                }
            });

            function updateHighlight(opts) {
                opts.forEach((o, i) => o.classList.toggle('highlighted', i === highlightedIdx));
                if (highlightedIdx >= 0 && opts[highlightedIdx]) {
                    opts[highlightedIdx].scrollIntoView({ block: 'nearest' });
                }
            }

            optsBox.addEventListener('click', (e) => {
                const opt = e.target.closest('.searchable-option');
                if (!opt) return;
                const value = opt.getAttribute('data-value');
                const found = currentOptions.find(o => o.value === value);
                if (found) {
                    setValue(found.value, found.label);
                    close();
                }
            });

            clearBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                setValue(null, null);
            });

            closeMobileBtn.addEventListener('click', close);

            return {
                element: wrap,
                setValue,
                setOptions,
                getValue: () => selectedValue,
                getSelected: () => currentOptions.find(o => o.value === selectedValue) || null,
                close
            };
        }

        // Đóng tất cả dropdown khi click ra ngoài
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.searchable')) {
                document.querySelectorAll('.searchable.open').forEach(el => el.classList.remove('open'));
                document.body.classList.remove('dropdown-open');
            }
        });

        // ========== TẠO 1 DÒNG ==========
        function createRow() {
            rowCounter++;
            const row = document.createElement('div');
            row.className = 'order-row';
            row.setAttribute('data-row-id', rowCounter);

            row.innerHTML = `
                <div class="row-number">Mặt hàng #${rowCounter}</div>
                <div class="cell-kho">
                    <span class="field-label">🏢 Kho</span>
                    <div class="kho-slot"></div>
                </div>
                <div class="cell-ma">
                    <span class="field-label">📦 Mã hàng - Tên hàng</span>
                    <div class="ma-slot"></div>
                </div>
                <div class="cell-dvt">
                    <span class="field-label">📐 ĐVT</span>
                    <div class="dvt-badge dvt-display">--</div>
                </div>
                <div class="cell-soluong">
                    <span class="field-label">🔢 Số lượng</span>
                    <input type="number" class="soluong-input" min="0.01" step="any" placeholder="Số lượng">
                </div>
                <div class="cell-remove">
                    <button type="button" class="btn-remove-row" title="Xóa dòng">✕</button>
                </div>
            `;

            const dvtDisplay = row.querySelector('.dvt-display');
            const soluongInput = row.querySelector('.soluong-input');
            const removeBtn = row.querySelector('.btn-remove-row');

            // Searchable cho Kho
            const khoOptions = khoList.map(k => ({ value: k, label: k, name: k }));
            const khoSearchable = createSearchable(khoOptions, '🏢 Chọn kho...', (khoValue) => {
                if (khoValue) {
                    const filtered = inventoryData.filter(it => it.kho === khoValue);
                    const maOptions = filtered.map(it => ({
                        value: it.ma,
                        label: `${it.ma} — ${it.ten}`,
                        code: it.ma,
                        name: it.ten,
                        searchText: it.ma + ' ' + it.ten,
                        dvt: it.dvt,
                        ten: it.ten
                    }));
                    maSearchable.setOptions(maOptions, true);
                } else {
                    maSearchable.setOptions([], false);
                }
                dvtDisplay.textContent = '--';
            });
            row.querySelector('.kho-slot').appendChild(khoSearchable.element);

            // Searchable cho Mã hàng (ban đầu disabled)
            const maSearchable = createSearchable([], '📦 Chọn kho trước...', (maValue, item) => {
                if (item) {
                    dvtDisplay.textContent = item.dvt || '--';
                } else {
                    dvtDisplay.textContent = '--';
                }
            }, true);
            row.querySelector('.ma-slot').appendChild(maSearchable.element);

            // Lưu reference vào row
            row._khoSearchable = khoSearchable;
            row._maSearchable = maSearchable;
            row._dvtDisplay = dvtDisplay;
            row._soluongInput = soluongInput;

            removeBtn.addEventListener('click', () => {
                const total = orderRows.querySelectorAll('.order-row').length;
                if (total <= 1) {
                    showToast('⚠️ Phải có ít nhất một mặt hàng trong phiếu yêu cầu.', true);
                    return;
                }
                row.style.opacity = '0';
                row.style.transform = 'translateY(-10px)';
                row.style.transition = 'all 0.25s';
                setTimeout(() => {
                    row.remove();
                    renumberRows();
                }, 250);
            });

            return row;
        }

        function renumberRows() {
            const rows = orderRows.querySelectorAll('.order-row');
            rows.forEach((r, i) => {
                const num = r.querySelector('.row-number');
                if (num) num.textContent = `Mặt hàng #${i + 1}`;
            });
        }

        function addRow() {
            const row = createRow();
            orderRows.appendChild(row);
            row.style.opacity = '0';
            row.style.transform = 'translateY(10px)';
            row.style.transition = 'all 0.3s ease';
            requestAnimationFrame(() => {
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            });
            renumberRows();
            return row;
        }

        // Khởi tạo 2 dòng mặc định
        addRow();
        addRow();

        addRowBtn.addEventListener('click', () => addRow());

        // ========== SUBMIT ==========
        orderForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const rows = orderRows.querySelectorAll('.order-row');
            const orderItems = [];
            let hasError = false;
            let errorMsg = '';

            rows.forEach((row, i) => {
                const kho = row._khoSearchable.getValue();
                const maSelected = row._maSearchable.getSelected();
                const ma = row._maSearchable.getValue();
                const dvt = row._dvtDisplay.textContent;
                const soluong = parseFloat(row._soluongInput.value);

                row._soluongInput.style.borderColor = '';

                if (!kho || !ma) {
                    hasError = true;
                    if (!errorMsg) errorMsg = `⚠️ Mặt hàng #${i+1}: vui lòng chọn đầy đủ kho và mã hàng.`;
                    return;
                }
                if (!soluong || soluong <= 0) {
                    hasError = true;
                    row._soluongInput.style.borderColor = '#e74c3c';
                    if (!errorMsg) errorMsg = `⚠️ Mặt hàng #${i+1}: số lượng phải lớn hơn 0.`;
                    return;
                }

                orderItems.push({
                    kho: kho,
                    ma_hang: ma,
                    ten_hang: maSelected ? maSelected.ten : '',
                    dvt: dvt,
                    so_luong: soluong
                });
            });

            if (hasError || orderItems.length === 0) {
                showToast(errorMsg || '⚠️ Vui lòng điền đầy đủ thông tin.', true);
                return;
            }

            const note = document.getElementById('noteInput').value.trim();
            const payload = {
                thoi_gian: new Date().toISOString(),
                don_vi: 'Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu',
                loai: 'YEU_CAU_DAT_VAT_TU',
                ghi_chu: note || '',
                danh_sach_vat_tu: orderItems
            };

            const submitBtn = orderForm.querySelector('.btn-submit');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ Đang gửi...';

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    showToast('✅ Đã gửi yêu cầu đặt vật tư thành công!');
                    orderRows.innerHTML = '';
                    addRow();
                    addRow();
                    document.getElementById('noteInput').value = '';
                } else {
                    throw new Error('Phản hồi không hợp lệ từ webhook.');
                }
            })
            .catch(error => {
                console.error('Lỗi gửi webhook:', error);
                console.log('Payload đã tạo:', payload);
                showToast('⚠️ Không thể kết nối webhook N8N. Vui lòng kiểm tra lại.', true);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            });
        });

        console.log('🌊 Hệ thống Order Vật Tư - Hải Châu đã sẵn sàng.');
        console.log('📋 Số lượng vật tư:', inventoryData.length);
        console.log('🏢 Số kho:', khoList.length);
    })();
</script>
