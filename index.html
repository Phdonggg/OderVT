<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Vật Tư - Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e9f0f5 0%, #dce6ef 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 40, 80, 0.15);
            overflow: hidden;
            margin-top: 20px;
        }

        .header {
            background: linear-gradient(135deg, #004d7a, #0077b6);
            padding: 25px 35px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .header .logo-icon {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #004d7a;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .header h1 small {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .form-body {
            padding: 30px 35px;
        }

        .order-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .order-table th {
            text-align: left;
            padding: 0 8px 8px 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .order-table td {
            padding: 0 8px;
            vertical-align: top;
        }

        .order-table select,
        .order-table input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #f9fbfd;
            transition: all 0.25s ease;
            outline: none;
            color: #1a2b3c;
        }

        .order-table select:focus,
        .order-table input:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.1);
            background: #fff;
        }

        .order-table .dvt-cell {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .order-table .dvt-cell span {
            padding: 10px 14px;
            background: #eef3f8;
            border-radius: 10px;
            font-weight: 500;
            color: #1e4660;
            min-width: 60px;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-remove-row {
            background: #fff;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }
        .btn-remove-row:hover {
            background: #e74c3c;
            color: white;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add {
            background: #e8f4fd;
            color: #0077b6;
            border: 2px dashed #0077b6;
        }
        .btn-add:hover {
            background: #d0eaff;
            border-style: solid;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0077b6, #023e8a);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 119, 182, 0.3);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0096c7, #023e8a);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 119, 182, 0.4);
        }

        .note-field {
            width: 100%;
            margin-top: 20px;
        }
        .note-field label {
            font-weight: 600;
            color: #2c3e50;
            display: block;
            margin-bottom: 6px;
        }
        .note-field textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e6ed;
            border-radius: 14px;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            background: #f9fbfd;
            outline: none;
            transition: border 0.25s;
        }
        .note-field textarea:focus {
            border-color: #0077b6;
        }

        .footer-info {
            margin-top: 25px;
            background: #f4f8fc;
            padding: 15px 20px;
            border-radius: 14px;
            color: #2c3e50;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .webhook-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .webhook-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #95a5a6;
            display: inline-block;
        }
        .webhook-status .dot.active {
            background: #2ecc71;
        }

        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 999;
            font-weight: 600;
            display: none;
            animation: slideIn 0.3s ease;
        }
        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .order-table thead {
                display: none;
            }
            .order-table tr {
                display: flex;
                flex-direction: column;
                border: 2px solid #e0e6ed;
                border-radius: 16px;
                padding: 15px;
                margin-bottom: 15px;
                background: #fdfdfd;
            }
            .order-table td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px 0;
                gap: 10px;
            }
            .order-table td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #2c3e50;
                min-width: 80px;
            }
            .header {
                padding: 20px;
                text-align: center;
            }
            .header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🌊</div>
            <h1>
                PHIẾU YÊU CẦU ĐẶT VẬT TƯ
                <small>Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu</small>
            </h1>
        </div>
    </div>

    <div class="form-body">
        <form id="orderForm">
            <table class="order-table" id="orderTable">
                <thead>

                        <th style="width:13%">ĐVT</th>
                        <th style="width:13%">Số lượng</th>
                        <th style="width:8%"></th>
                    </tr>
                </thead>
                <tbody id="orderRows">
                    <!-- dynamic rows -->
                </tbody>
            </table>

            <div class="action-bar">
                <button type="button" class="btn btn-add" id="addRowBtn">
                    ➕ Thêm mặt hàng
                </button>
                <button type="submit" class="btn btn-submit">
                    📤 Gửi yêu cầu đặt hàng
                </button>
            </div>

            <div class="note-field">
                <label for="noteInput">📝 Ghi chú yêu cầu</label>
                <textarea id="noteInput" placeholder="Nhập ghi chú (nếu có) ..."></textarea>
            </div>
        </form>

        <div class="footer-info">
            <div class="webhook-status">
                <span class="dot" id="webhookDot"></span>
                <span id="webhookLabel">Webhook N8N: Chưa cấu hình</span>
            </div>
            <div style="color:#5c6b7a;">
                🕒 <span id="currentTime"></span>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

        const khoList = [...new Set(inventoryData.map(item => item.kho))];

        // Webhook URL - thay đổi URL này thành webhook N8N của bạn
        const WEBHOOK_URL = "https://hcai.io.vn/webhook/8ba5d9e5-b3ec-497a-af2f-5c5fd3a456bb";

        // DOM elements
        const orderRows = document.getElementById('orderRows');
        const addRowBtn = document.getElementById('addRowBtn');
        const orderForm = document.getElementById('orderForm');
        const toast = document.getElementById('toast');
        const webhookDot = document.getElementById('webhookDot');
        const webhookLabel = document.getElementById('webhookLabel');
        const currentTimeSpan = document.getElementById('currentTime');

        // Cập nhật đồng hồ
        function updateTime() {
            const now = new Date();
            currentTimeSpan.textContent = now.toLocaleString('vi-VN', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Kiểm tra webhook URL đã được cấu hình chưa
        if (WEBHOOK_URL && !WEBHOOK_URL.includes('your-n8n-instance')) {
            webhookDot.classList.add('active');
            webhookLabel.textContent = 'Webhook N8N: Sẵn sàng';
        } else {
            webhookLabel.textContent = 'Webhook N8N: Chưa cấu hình (vui lòng cập nhật URL)';
        }

        // Toast notification
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // Tạo option cho select kho
        function createKhoOptions(selectedKho = '') {
            let html = '<option value="">🏢 Chọn kho...</option>';
            khoList.forEach(kho => {
                const selected = kho === selectedKho ? ' selected' : '';
                html += `<option value="${kho}"${selected}>${kho}</option>`;
            });
            return html;
        }

        // Tạo option cho select mã hàng (filter theo kho)
        function createMaHangOptions(kho, selectedMa = '') {
            const filtered = inventoryData.filter(item => item.kho === kho);
            let html = '<option value="">📦 Chọn mã hàng...</option>';
            filtered.forEach(item => {
                const selected = item.ma === selectedMa ? ' selected' : '';
                html += `<option value="${item.ma}" data-ten="${item.ten}" data-dvt="${item.dvt}"${selected}>${item.ma} - ${item.ten}</option>`;
            });
            return html;
        }

        // Tạo một dòng mới
        function createRow(kho = '', ma = '', soluong = '', dvt = '') {
            rowCounter++;
            const row = document.createElement('tr');
            row.setAttribute('data-row-id', rowCounter);
            row.innerHTML = `
                <td data-label="Kho">
                    <select class="kho-select" name="kho_${rowCounter}">
                        ${createKhoOptions(kho)}
                    </select>
                </td>
                <td data-label="Mã hàng - Tên hàng">
                    <select class="ma-select" name="ma_${rowCounter}">
                        ${kho ? createMaHangOptions(kho, ma) : '<option value="">📦 Vui lòng chọn kho trước</option>'}
                    </select>
                </td>
                <td data-label="ĐVT">
                    <div class="dvt-cell">
                        <span class="dvt-display">${dvt || '--'}</span>
                    </div>
                </td>
                <td data-label="Số lượng">
                    <input type="number" class="soluong-input" name="soluong_${rowCounter}" 
                           min="0.01" step="any" placeholder="Nhập số lượng" value="${soluong}">
                </td>
                <td>
                    <button type="button" class="btn-remove-row" title="Xóa dòng">✕</button>
                </td>
            `;

            // Event listeners cho dòng
            const khoSelect = row.querySelector('.kho-select');
            const maSelect = row.querySelector('.ma-select');
            const dvtDisplay = row.querySelector('.dvt-display');
            const removeBtn = row.querySelector('.btn-remove-row');

            khoSelect.addEventListener('change', function() {
                const selectedKho = this.value;
                if (selectedKho) {
                    maSelect.innerHTML = createMaHangOptions(selectedKho);
                } else {
                    maSelect.innerHTML = '<option value="">📦 Vui lòng chọn kho trước</option>';
                }
                dvtDisplay.textContent = '--';
            });

            maSelect.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                const dvtValue = selectedOption.getAttribute('data-dvt') || '--';
                const tenValue = selectedOption.getAttribute('data-ten') || '';
                dvtDisplay.textContent = dvtValue;
            });

            removeBtn.addEventListener('click', function() {
                const totalRows = orderRows.querySelectorAll('tr').length;
                if (totalRows <= 1) {
                    showToast('⚠️ Phải có ít nhất một mặt hàng trong phiếu yêu cầu.', true);
                    return;
                }
                row.style.opacity = '0';
                row.style.transition = 'opacity 0.2s';
                setTimeout(() => {
                    row.remove();
                }, 200);
            });

            return row;
        }

        // Thêm dòng mới
        function addRow(kho = '', ma = '', soluong = '', dvt = '') {
            const row = createRow(kho, ma, soluong, dvt);
            orderRows.appendChild(row);
            // Animation
            row.style.opacity = '0';
            row.style.transform = 'translateY(10px)';
            row.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            }, 10);
        }

        // Khởi tạo 2 dòng mặc định
        addRow();
        addRow();

        // Nút thêm dòng
        addRowBtn.addEventListener('click', () => addRow());

        // Xử lý submit form
        orderForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const rows = orderRows.querySelectorAll('tr');
            const orderItems = [];
            let hasError = false;

            rows.forEach(row => {
                const khoSelect = row.querySelector('.kho-select');
                const maSelect = row.querySelector('.ma-select');
                const soluongInput = row.querySelector('.soluong-input');
                const dvtDisplay = row.querySelector('.dvt-display');

                const kho = khoSelect ? khoSelect.value : '';
                const maOption = maSelect ? maSelect.options[maSelect.selectedIndex] : null;
                const ma = maOption ? maOption.value : '';
                const ten = maOption ? maOption.getAttribute('data-ten') : '';
                const dvt = dvtDisplay ? dvtDisplay.textContent : '';
                const soluong = soluongInput ? parseFloat(soluongInput.value) : 0;

                if (!kho || !ma) {
                    hasError = true;
                    return;
                }
                if (!soluong || soluong <= 0) {
                    hasError = true;
                    soluongInput.style.borderColor = '#e74c3c';
                    return;
                }
                soluongInput.style.borderColor = '#e0e6ed';

                orderItems.push({
                    kho: kho,
                    ma_hang: ma,
                    ten_hang: ten,
                    dvt: dvt,
                    so_luong: soluong
                });
            });

            if (hasError || orderItems.length === 0) {
                showToast('⚠️ Vui lòng điền đầy đủ thông tin cho tất cả các dòng (chọn kho, mã hàng và số lượng > 0).', true);
                return;
            }

            const note = document.getElementById('noteInput').value.trim();
            const payload = {
                thoi_gian: new Date().toISOString(),
                don_vi: 'Công ty Cổ phần Thực phẩm Quốc Tế Hải Châu',
                loai: 'YEU_CAU_DAT_VAT_TU',
                ghi_chu: note || '',
                danh_sach_vat_tu: orderItems
            };

            // Gửi đến webhook N8N
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    showToast('✅ Đã gửi yêu cầu đặt vật tư thành công! Hệ thống sẽ gửi thông báo qua Telegram/Zalo.');
                    // Reset form
                    orderRows.innerHTML = '';
                    addRow();
                    addRow();
                    document.getElementById('noteInput').value = '';
                } else {
                    throw new Error('Phản hồi không hợp lệ từ webhook.');
                }
            })
            .catch(error => {
                console.error('Lỗi gửi webhook:', error);
                // Nếu lỗi kết nối, vẫn hiển thị dữ liệu đã tạo để test
                console.log('Payload đã tạo:', payload);
                showToast('⚠️ Không thể kết nối webhook N8N. Vui lòng kiểm tra lại URL webhook hoặc kết nối mạng. Dữ liệu đã được in ra console.', true);
            });
        });

        // Cập nhật trạng thái webhook nếu người dùng muốn test
        console.log('🌊 Hệ thống Order Vật Tư - Hải Châu đã sẵn sàng.');
        console.log('📋 Số lượng vật tư trong danh mục:', inventoryData.length);
        console.log('🏢 Số kho:', khoList.length);
        console.log('🔗 Webhook URL hiện tại:', WEBHOOK_URL);
        console.log('ℹ️ Để thay đổi webhook URL, hãy sửa biến WEBHOOK_URL trong mã nguồn.');
    })();
